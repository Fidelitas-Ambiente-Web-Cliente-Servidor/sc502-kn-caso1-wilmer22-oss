<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante Ficticio</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>  <!-- Encabezado del restaurante -->
  <header>
    <h1>Restaurante La Buona Tavola</h1>
    <p>Cocina italiana con alma costarricense</p>
  </header>

  <!-- Sección 1: Menú -->
  <section id="seccion-menu">
    <h2>Nuestro Menú</h2>

    <!-- Botones de filtro por categoría -->
    <div id="filtros">
      <button onclick="filtrarCategoria('Todos')">Todos</button>
      <button onclick="filtrarCategoria('Entrada')">Entradas</button>
      <button onclick="filtrarCategoria('Plato Fuerte')">Platos Fuertes</button>
      <button onclick="filtrarCategoria('Postre')">Postres</button>
    </div>

    <!-- Aquí JavaScript va a insertar las cards del menú -->
    <div id="contenedor-menu"></div>
  </section>

  <!-- Sección 2: Reservas -->
  <section id="seccion-reservas">
    <h2>Hacer una Reserva</h2>

    <!-- Formulario -->
    <form id="form-reserva">

      <div>
        <label>Nombre completo</label>
        <input type="text" id="nombre" />
        <span class="error-campo" id="error-nombre"></span>
      </div>

      <div>
        <label>Correo electrónico</label>
        <input type="email" id="correo" />
        <span class="error-campo" id="error-correo"></span>
      </div>

      <div>
        <label>Fecha de reserva</label>
        <input type="date" id="fecha" />
        <span class="error-campo" id="error-fecha"></span>
      </div>

      <div>
        <label>Hora</label>
        <select id="hora">
          <option value="">Seleccione una hora</option>
          <option value="12:00">12:00</option>
          <option value="13:00">13:00</option>
          <option value="18:00">18:00</option>
          <option value="19:00">19:00</option>
          <option value="20:00">20:00</option>
        </select>
      </div>

      <div>
        <label>Número de personas</label>
        <input type="number" id="personas" min="1" max="20" />
        <span class="error-campo" id="error-personas"></span>
      </div>

      <div>
        <label>Comentarios (opcional)</label>
        <textarea id="comentarios"></textarea>
      </div>

      <button type="submit" id="btn-enviar" disabled>Reservar</button>

    </form>

    <!-- Tabla donde aparecen las reservas registradas -->
    <table id="tabla-reservas">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Personas</th>
        </tr>
      </thead>
      <tbody id="cuerpo-tabla"></tbody>
    </table>

    <!-- Resumen dinámico -->
    <div class="resumen-reservas" id="resumen"></div>

  </section>

  <script src="js/app.js"></script>
</body>
</html>
